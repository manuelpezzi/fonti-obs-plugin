<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Checklist OBS</title>
    <style>
        body {
            background: transparent;
            margin: 0;
            padding: 15px;
            font-family: sans-serif;
            /* Flexbox per riga singola */
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            /* Impedisce di andare a capo */
            gap: 12px;
            justify-content: flex-start;
            align-items: center;
            overflow-x: auto;
            /* Permette lo scorrimento orizzontale se sono troppi */
            overflow-y: hidden;
        }

        /* Nasconde la barra di scorrimento su OBS */
        body::-webkit-scrollbar {
            display: none;
        }

        .game-card {
            position: relative;
            flex: 0 0 auto;
            /* Impedisce alle card di rimpicciolirsi */
            width: 120px;
            height: 160px;
            cursor: pointer;
            border: 2px solid #fff;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.5);
            /* Sfondo se la foto è piccola */
            overflow: hidden;
            transition: transform 0.2s;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            /* 'contain' mostra la foto intera, centrata, senza tagliarla */
            object-fit: contain;
        }

        .game-card.completed {
            filter: grayscale(100%) brightness(30%);
            border-color: #00ff00;
        }

        .game-card.completed::after {
            content: '✔️';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: #00ff00;
            z-index: 2;
        }

        .game-card:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="game-card" id="game1" onclick="toggleGame('game1')">
        <img src="img/fortnite.jpg" alt="Fortnite">
    </div>

    <div class="game-card" id="game2" onclick="toggleGame('game2')">
        <img src="img/dialed.png" alt="Dialed">
    </div>

    <div class="game-card" id="game3" onclick="toggleGame('game3')">
        <img src="img/fallguys.jpg" alt="Fall Guys">
    </div>

    <div class="game-card" id="game4" onclick="toggleGame('game4')">
        <img src="img/flagle.jpg" alt="Flagle">
    </div>

    <div class="game-card" id="game5" onclick="toggleGame('game5')">
        <img src="img/geog.jpg" alt="Geoguesser">
    </div>

    <div class="game-card" id="game6" onclick="toggleGame('game6')">
        <img src="img/higer.png" alt="Higher Lower">
    </div>

    <div class="game-card" id="game7" onclick="toggleGame('game7')">
        <img src="img/images.png" alt="Timeguess">
    </div>

    <script>
        function toggleGame(id) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.toggle('completed');
                localStorage.setItem(id, el.classList.contains('completed'));
            }
        }

        window.onload = () => {
            document.querySelectorAll('.game-card').forEach(card => {
                if (localStorage.getItem(card.id) === 'true') {
                    card.classList.add('completed');
                }
            });
        };
    </script>
</body>

</html>
