<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: transparent;
            font-family: sans-serif;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .game-card {
            position: relative;
            width: 120px;
            height: 160px;
            cursor: pointer;
            border: 2px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.2s;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-card.completed {
            filter: grayscale(100%) brightness(40%);
            border-color: #00ff00;
        }

        .game-card.completed::after {
            content: '✔️';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: #00ff00;
        }
    </style>
</head>

<body>

    <!-- Aggiungi qui i tuoi giochi con un ID univoco (id="gioco1", etc) -->
    <div class="game-card" id="game1" onclick="toggleGame('game1')">
        <img src="img/fortnite.jpg" alt="fortnite">
    </div>



    <script>
        // Funzione per cliccare e salvare
        function toggleGame(id) {
            const el = document.getElementById(id);
            el.classList.toggle('completed');
            const isCompleted = el.classList.contains('completed');
            localStorage.setItem(id, isCompleted); // Salva lo stato nel browser
        }

        // Carica lo stato salvato all'apertura
        document.querySelectorAll('.game-card').forEach(card => {
            if (localStorage.getItem(card.id) === 'true') {
                card.classList.add('completed');
            }
        });
    </script>
</body>

</html>
